# The contents of this file is based on https://github.com/home-assistant/core/blob/dev/pyproject.toml

target-version = "py314"

[lint]
select = [
    "ALL",
]

ignore = [
    "ANN401", # Dynamically typed expressions (typing.Any) are disallowed
    "COM812", # incompatible with formatter
    "ISC001", # incompatible with formatter
    "D202", # No blank lines allowed after function docstring
    "D203", # 1 blank line required before class docstring
    "D212", # multi-line-summary-first-line (incompatible with formatter)
    "D213", # Multi-line docstring summary should start at the second line
    "D404", # First word of the docstring should not be This
    "D406", # Section name should end with a newline
    "D407", # Section name underlining
    "D411", # Missing blank line before section
    "E501", # line too long
    "E731", # do not assign a lambda expression, use a def
    # Missing docstrings - this is a HA custom component, docstrings are optional
    "D100", "D101", "D102", "D103", "D104", "D105", "D107", "D205", "D401",
    # Boolean trap rules - too opinionated, requires major API changes
    "FBT001", "FBT002", "FBT003",
    # Magic value comparisons - too opinionated for this codebase
    "PLR2004",
    # Complexity metrics - require major structural refactoring
    "PLR0912", "PLR0913", "PLR0915", "PLR0911",
    # Missing type annotations - optional in this codebase
    "ANN001", "ANN002", "ANN003", "ANN201", "ANN202",
    # Argument/variable shadowing builtins - necessary (id, type, range, input)
    "A001", "A002",
    # Private member access - necessary within the package internals
    "SLF001",
    # Script shebang rules - not relevant to HA integration source files
    "EXE001", "EXE003", "EXE005",
    # Security false positives
    "S105",  # Possible hardcoded password - false positive on constant names
    "S101",  # assert - valid in HA integrations
    "S110",  # try-except-pass - valid pattern
    "S324",  # MD5/SHA1 use - required by Tuya BLE protocol (cannot change algorithm)
    # Exception message style
    "TRY003", "EM101", "EM102",
    # Broad exception catching - intentional in BLE connection handlers
    "BLE001",
]

[lint.flake8-pytest-style]
fixture-parentheses = false

[lint.pyupgrade]
keep-runtime-typing = true

[lint.mccabe]
max-complexity = 25

[lint.per-file-ignores]
"tests/**" = [
    "S101",   # assert is the standard assertion mechanism in pytest
    "D102",   # test methods do not require docstrings
    "D103",   # test functions do not require docstrings
    "D104",   # test packages do not require docstrings
    "ANN",    # type annotations not required in test helpers
    "FBT001", # boolean positional args are fine in test helpers
    "FBT002", # boolean default args are fine in test helpers
    "SLF001", # accessing private members is acceptable in tests
    "D101",   # test classes do not require docstrings
    "S106",   # hardcoded passwords are unavoidable in credential validation tests
]
